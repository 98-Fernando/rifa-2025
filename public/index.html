<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pagar con Wompi</title>
</head>
<body>
  <h1>Compra tu Rifa 🎟️</h1>
  <button id="btnPagar">Pagar</button>

  <!-- Script oficial de Wompi -->
  <script src="https://checkout.wompi.co/widget.js"></script>

  <script>
    let CONFIG = {};

    async function cargarConfig() {
      try {
        const res = await fetch("/api/config"); // tu backend
        const data = await res.json();
        CONFIG = data;

        console.log("⚙️ Config cargada:", CONFIG);

        // Inicializar Wompi solo después de cargar la config
        window.$wompi.initialize({
          publicKey: CONFIG.publicKey,
        });

        // Activar botón de pago
        document.getElementById("btnPagar").addEventListener("click", () => {
          window.$wompi.open({
            currency: "COP",
            amountInCents: CONFIG.precio * 100, // Wompi usa centavos
            reference: "COMPRA_" + Date.now(),
            redirectUrl: CONFIG.urlSuccess, // o Pending/Failure si aplica
          });
        });
      } catch (error) {
        console.error("❌ Error cargando config:", error);
      }
    }

    // Ejecutar
    cargarConfig();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rifa 2025 🎟️</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Bienvenido a la Rifa 2025 🎉</h1>

  <!-- 🔹 Números disponibles -->
  <div id="numeros-container"></div>
  <p id="porcentaje"></p>

  <!-- 🔹 Formulario para datos -->
  <form id="formCompra">
    <input type="text" id="nombre" placeholder="Tu nombre" required>
    <input type="email" id="correo" placeholder="Tu correo" required>
    <input type="tel" id="telefono" placeholder="Tu teléfono" required>
    <button type="submit">Reservar y Pagar</button>
  </form>

  <!-- ✅ Script oficial de Wompi Widget -->
  <script src="https://cdn.wompi.co/libs/js/v1.js"></script>

  <script>
    let CONFIG = {};

    // ===============================
    // 🔹 Cargar configuración desde backend
    // ===============================
    async function cargarConfig() {
      try {
        const res = await fetch("/api/config");
        CONFIG = await res.json();
        console.log("⚙️ Config cargada:", CONFIG);
      } catch (err) {
        console.error("❌ Error cargando configuración:", err);
        alert("No se pudo cargar la configuración del pago");
      }
    }

    // ===============================
    // 🔹 Cargar números de tickets
    // ===============================
    async function cargarNumeros() {
      try {
        const res = await fetch("/api/tickets/numeros");
        const data = await res.json();
        if (data.exito) {
          const cont = document.getElementById("numeros-container");
          cont.innerHTML = "";
          data.numeros.forEach(n => {
            const btn = document.createElement("button");
            btn.textContent = n.numero;
            btn.disabled = !n.disponible;
            btn.className = n.disponible ? "libre" : "ocupado";
            btn.addEventListener("click", () => btn.classList.toggle("seleccionado"));
            cont.appendChild(btn);
          });
        }
      } catch (err) {
        console.error("❌ Error cargando números:", err);
      }
    }

    // ===============================
    // 🔹 Cargar porcentaje vendido
    // ===============================
    async function cargarConsulta() {
      try {
        const res = await fetch("/api/tickets/consulta");
        const data = await res.json();
        if (data.exito) {
          document.getElementById("porcentaje").textContent =
            `🎟️ Vendidos: ${data.vendidos} (${data.porcentaje}%)`;
        }
      } catch (err) {
        console.error("❌ Error consulta:", err);
      }
    }

    // ===============================
    // 🚀 Flujo principal
    // ===============================
    document.addEventListener("DOMContentLoaded", async () => {
      await cargarConfig();
      await cargarNumeros();
      await cargarConsulta();

      // Evento del formulario
      document.getElementById("formCompra").addEventListener("submit", async (e) => {
        e.preventDefault();

        const nombre = document.getElementById("nombre").value;
        const correo = document.getElementById("correo").value;
        const telefono = document.getElementById("telefono").value;

        const seleccionados = Array.from(document.querySelectorAll(".seleccionado"))
          .map(btn => btn.textContent);

        if (!seleccionados.length) {
          alert("Selecciona al menos un número 🎟️");
          return;
        }

        try {
          // Guardar pendiente en backend
          const res = await fetch("/api/tickets/guardar-pendiente", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nombre, correo, telefono, numeros: seleccionados })
          });
          const data = await res.json();

          if (!data.exito) {
            alert("❌ Error guardando pendiente");
            return;
          }

          console.log("✅ Pendiente guardado:", data);

          const amountInCents = CONFIG.precio * 100 * seleccionados.length;
          const currency = "COP";
          const reference = data.reference;

          // Pedir firma al backend
          const firmaResp = await fetch("/api/signature", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ reference, amountInCents, currency }),
          });
          const firmaData = await firmaResp.json();

          if (!firmaData.exito) {
            alert("❌ Error generando firma");
            return;
          }

          // ✅ Verificar que Wompi esté disponible
          if (typeof $wompi === "undefined") {
            alert("❌ Error: Wompi no se cargó correctamente");
            return;
          }

          // Abrir Wompi Widget
          $wompi.open({
            currency,
            amountInCents,
            reference,
            signature: firmaData.signature,
            publicKey: CONFIG.publicKey,
            redirectUrl: CONFIG.urlSuccess,
          });
        } catch (err) {
          console.error("❌ Error en el flujo de pago:", err);
          alert("Error procesando el pago");
        }
      });
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">

  <title>Rifa 2025 🎟️</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <h1>Bienvenido a la Rifa 2025 🎉</h1>

  <!-- 🔹 Números disponibles -->
  <div id="numeros-container"></div>
  <p id="porcentaje"></p>

  <!-- 🔹 Formulario para datos -->

  <!-- Tu lógica ahora está en app.js -->
